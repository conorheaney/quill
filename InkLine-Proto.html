<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quill</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #f5efe4 0%, #e5eef5 100%);
      --panel: rgba(255, 252, 247, 0.88);
      --panel-strong: rgba(255, 252, 247, 0.96);
      --border: rgba(49, 66, 82, 0.16);
      --text: #1f2a35;
      --muted: #5e6a74;
      --accent: #d46a3a;
      --accent-strong: #b85025;
      --toolbar: rgba(255, 255, 255, 0.66);
      --shadow: 0 20px 45px rgba(31, 42, 53, 0.12);
      --code-bg: #f2ede5;
      --preview-bg: rgba(255, 255, 255, 0.6);
      --success: #2c7a5b;
      --font-ui: "Segoe UI", "Trebuchet MS", sans-serif;
      --font-display: Georgia, "Palatino Linotype", serif;
      --font-mono: "Cascadia Code", Consolas, monospace;
    }

    body.dark {
      --bg: radial-gradient(circle at top, #253043 0%, #0f1722 65%);
      --panel: rgba(17, 24, 39, 0.88);
      --panel-strong: rgba(15, 23, 34, 0.96);
      --border: rgba(168, 184, 204, 0.15);
      --text: #e6edf6;
      --muted: #9aacbf;
      --accent: #ff9c66;
      --accent-strong: #ff7c43;
      --toolbar: rgba(32, 44, 61, 0.72);
      --shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
      --code-bg: #1a2432;
      --preview-bg: rgba(14, 20, 29, 0.55);
      --success: #7fdaa2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font-ui);
      color: var(--text);
      background: var(--bg);
    }

    body {
      padding: 0;
      overflow: auto;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .shell {
      width: 100%;
      min-height: 100vh;
      height: 100vh;
      border: 1px solid var(--border);
      border-radius: 0;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
    }

    .sidebar {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      border-right: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.06));
    }

    .sidebar-product {
      padding: 24px 24px 20px;
      border-bottom: 1px solid rgba(212, 106, 58, 0.22);
      background:
        linear-gradient(120deg, rgba(212, 106, 58, 0.22), transparent 45%),
        linear-gradient(300deg, rgba(70, 119, 173, 0.18), transparent 50%);
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.12);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .sidebar-brand-icon {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      object-fit: cover;
      border: 1px solid rgba(49, 66, 82, 0.12);
      background: rgba(255, 255, 255, 0.7);
    }

    .sidebar-product h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .sidebar-tagline {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.96rem;
      letter-spacing: 0.01em;
    }

    .sidebar-outline {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .content-area {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .content-header {
      position: relative;
      display: grid;
      gap: 12px;
      padding: 20px 24px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      box-shadow:
        inset 0 -1px 0 rgba(255, 255, 255, 0.1),
        0 10px 30px rgba(15, 23, 34, 0.08);
    }

    .content-header-main {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .content-header-copy h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.7rem;
      letter-spacing: -0.02em;
    }

    .content-header-copy p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .content-header-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .shell-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.86rem;
      background: rgba(255, 255, 255, 0.08);
    }

    .shell-footer span:last-child {
      text-align: right;
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-strong);
      color: var(--text);
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-1px);
      border-color: var(--accent);
      outline: none;
    }

    button[data-primary="true"] {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .status {
      margin-left: auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .status strong {
      color: var(--success);
      font-weight: 600;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      min-height: 0;
    }

    .pane {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .pane:last-child {
      border-right: none;
    }

    .pane-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 65px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.16);
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .pane-header-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      min-width: 0;
    }

    .pane-header-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .pane-header-buttons[data-toolbar-actions="true"] {
      align-items: center;
    }

    .pane-header-actions span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: none;
      letter-spacing: 0;
      max-width: 100%;
      font-size: 0.82rem;
      text-align: right;
    }

    .header-button {
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 0.8rem;
      letter-spacing: 0;
      text-transform: none;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      line-height: 1;
      font-weight: 700;
    }

    .icon-button code {
      font: 0.8rem/1 var(--font-mono);
    }

    .toggle-switch {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 11px 7px 14px;
      border-radius: 999px;
    }

    .toggle-switch-label {
      font-size: 0.8rem;
      letter-spacing: 0;
      text-transform: none;
      white-space: nowrap;
    }

    .toggle-switch-track {
      position: relative;
      width: 42px;
      height: 24px;
      border-radius: 999px;
      background: rgba(94, 106, 116, 0.35);
      transition: background 0.2s ease;
      flex-shrink: 0;
    }

    .toggle-switch-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(15, 23, 34, 0.28);
      transition: transform 0.2s ease;
    }

    .toggle-switch[aria-checked="true"] .toggle-switch-track {
      background: var(--accent);
    }

    .toggle-switch[aria-checked="true"] .toggle-switch-thumb {
      transform: translateX(18px);
    }

    .header-button[data-accent="true"] {
      border-color: rgba(212, 106, 58, 0.4);
      background: rgba(212, 106, 58, 0.1);
    }

    .header-button[data-variant="secondary"] {
      background: var(--panel-strong);
      border-width: 2px;
      border-color: rgba(108, 146, 193, 0.55);
      color: var(--text);
    }

    .header-button[data-variant="secondary"]:hover,
    .header-button[data-variant="secondary"]:focus-visible {
      border-color: var(--accent);
      background: var(--panel-strong);
    }

    .workspace.editor-collapsed {
      grid-template-columns: minmax(0, 1fr);
    }

    .workspace.editor-collapsed #editorPane {
      display: none;
    }

    .workspace.editor-collapsed .preview-pane {
      border-right: none;
    }

    .editor,
    .preview {
      width: 100%;
      min-height: 0;
      flex: 1;
      overflow: auto;
      padding: 20px;
    }

    .editor {
      border: 0;
      resize: none;
      background: transparent;
      color: var(--text);
      font: 1rem/1.7 var(--font-mono);
      outline: none;
      tab-size: 2;
    }

    .preview {
      background: var(--preview-bg);
      line-height: 1.75;
    }

    .preview-block {
      position: relative;
      margin: 0 0 0.9rem;
      padding: 0.2rem 4.35rem 0.2rem 0.35rem;
      border-radius: 16px;
      border: 1px solid transparent;
      transition: border-color 0.18s ease, background 0.18s ease;
      cursor: pointer;
    }

    .preview-block:hover,
    .preview-block:focus-visible {
      border-color: rgba(212, 106, 58, 0.3);
      background: rgba(212, 106, 58, 0.06);
      outline: none;
    }

    .preview-block.is-editing {
      padding: 0;
      border-color: transparent;
      background: transparent;
      cursor: default;
    }

    .preview-block > :last-child {
      margin-bottom: 0;
    }

    .preview-block-actions {
      position: absolute;
      top: 0.45rem;
      right: 0.45rem;
      display: flex;
      flex-direction: row;
      gap: 6px;
      opacity: 0;
      transform: translateX(6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }

    .preview-block:hover .preview-block-actions,
    .preview-block:focus-visible .preview-block-actions {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .preview-block-action {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      line-height: 1;
      background: var(--panel-strong);
    }

    .inline-editor {
      border: 1px solid rgba(212, 106, 58, 0.35);
      border-radius: 20px;
      background: var(--panel-strong);
      box-shadow: var(--shadow);
      overflow: hidden;
      cursor: default;
    }

    .inline-editor-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(212, 106, 58, 0.09);
    }

    .inline-editor-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .inline-editor label {
      color: var(--muted);
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .inline-editor select,
    .inline-editor textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--preview-bg);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    .inline-editor select {
      min-width: 150px;
      padding: 10px 12px;
    }

    .inline-editor-body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .inline-editor-textarea {
      min-height: 160px;
      resize: vertical;
      padding: 14px 16px;
      font: 0.96rem/1.6 var(--font-mono);
      tab-size: 2;
    }

    .inline-editor-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .inline-editor-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .preview > :first-child {
      margin-top: 0;
    }

    .preview h1,
    .preview h2,
    .preview h3,
    .preview h4,
    .preview h5,
    .preview h6 {
      font-family: var(--font-display);
      line-height: 1.2;
      margin: 1.4em 0 0.55em;
    }

    .preview p,
    .preview ul,
    .preview ol,
    .preview blockquote,
    .preview pre,
    .preview table {
      margin: 0 0 1rem;
    }

    .preview code {
      font-family: var(--font-mono);
      background: var(--code-bg);
      padding: 0.12rem 0.35rem;
      border-radius: 6px;
    }

    .preview pre {
      background: var(--code-bg);
      padding: 1rem 1.1rem;
      border-radius: 16px;
      overflow: auto;
    }

    .preview pre code {
      background: transparent;
      padding: 0;
    }

    .preview blockquote {
      padding: 0.4rem 1rem;
      border-left: 4px solid var(--accent);
      background: rgba(212, 106, 58, 0.09);
      border-radius: 0 12px 12px 0;
      color: var(--muted);
    }

    .preview a {
      color: var(--accent-strong);
    }

    .preview img {
      max-width: 100%;
      border-radius: 16px;
      display: block;
    }

    .outline {
      min-height: 0;
      flex: 1;
      overflow: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .outline-item {
      width: 100%;
      text-align: left;
      border-radius: 14px;
      padding: 10px 12px;
      background: transparent;
      transform: none;
    }

    .outline-item:hover,
    .outline-item:focus-visible,
    .outline-item.is-active {
      background: rgba(212, 106, 58, 0.12);
      border-color: rgba(212, 106, 58, 0.4);
    }

    .outline-item[data-level="2"] {
      margin-left: 12px;
    }

    .outline-item[data-level="3"] {
      margin-left: 24px;
    }

    .outline-item[data-level="4"] {
      margin-left: 36px;
    }

    .outline-item[data-level="5"],
    .outline-item[data-level="6"] {
      margin-left: 48px;
    }

    .outline-empty {
      color: var(--muted);
      line-height: 1.6;
      padding: 4px 6px;
    }

    .preview table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
    }

    .preview th,
    .preview td {
      border: 1px solid var(--border);
      padding: 0.7rem 0.9rem;
      text-align: left;
      vertical-align: top;
    }

    .preview th {
      background: rgba(212, 106, 58, 0.12);
    }

    .drop-active .editor {
      background:
        linear-gradient(rgba(212, 106, 58, 0.07), rgba(212, 106, 58, 0.07)),
        transparent;
    }

    .dialog-backdrop::backdrop {
      background: rgba(15, 23, 34, 0.58);
      backdrop-filter: blur(6px);
    }

    .code-dialog {
      width: min(920px, calc(100vw - 28px));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 0;
      background: var(--panel-strong);
      color: var(--text);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .code-dialog form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.88fr);
      min-height: min(70vh, 700px);
    }

    .code-dialog-main,
    .code-dialog-preview {
      padding: 22px;
      min-width: 0;
    }

    .code-dialog-main {
      border-right: 1px solid var(--border);
    }

    .code-dialog h2 {
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-size: 1.85rem;
    }

    .code-dialog p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .code-dialog label,
    .code-dialog select {
      font: inherit;
    }

    .code-dialog select,
    .code-dialog textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--preview-bg);
      color: var(--text);
      padding: 14px 16px;
      margin-top: 8px;
      outline: none;
    }

    .code-dialog textarea {
      min-height: 320px;
      resize: vertical;
      font: 0.96rem/1.6 var(--font-mono);
      tab-size: 2;
    }

    .code-dialog select:focus-visible,
    .code-dialog textarea:focus-visible {
      border-color: var(--accent);
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .code-preview-card {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .code-preview-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .code-preview-surface {
      flex: 1;
      min-height: 320px;
      padding: 18px;
      border-radius: 20px;
      background: #0f172a;
      color: #dbe7f3;
      overflow: auto;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .code-preview-surface pre {
      margin: 0;
      font: 0.94rem/1.65 var(--font-mono);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .token-keyword {
      color: #ff8f70;
    }

    .token-string {
      color: #c3e88d;
    }

    .token-number {
      color: #82aaff;
    }

    .token-comment {
      color: #7f8da3;
      font-style: italic;
    }

    .token-operator {
      color: #89ddff;
    }

    .token-plain {
      color: #dbe7f3;
    }

    .toast-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      min-width: 240px;
      max-width: 420px;
      padding: 18px 20px;
      border-radius: 16px;
      background: rgba(212, 106, 58, 0.18);
      border: 1px solid rgba(212, 106, 58, 0.42);
      color: var(--accent-strong);
      box-shadow: 0 12px 26px rgba(212, 106, 58, 0.18);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toast-title {
      display: block;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .confirm-dialog {
      width: min(480px, calc(100vw - 28px));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 0;
      background: var(--panel-strong);
      color: var(--text);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .confirm-dialog::backdrop {
      background: rgba(15, 23, 34, 0.52);
      backdrop-filter: blur(5px);
    }

    .confirm-dialog-content {
      padding: 22px;
    }

    .confirm-dialog h2 {
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-size: 1.65rem;
    }

    .confirm-dialog p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .confirm-dialog .dialog-actions {
      margin-top: 18px;
    }

    @media (max-width: 920px) {
      .shell {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .content-header {
        padding: 18px 16px 16px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .pane {
        min-height: 46vh;
        border-bottom: 1px solid var(--border);
        border-right: none;
      }

      .pane:last-child {
        border-bottom: none;
      }

      .status {
        width: 100%;
        margin-left: 0;
        justify-content: space-between;
      }

      .pane-header-actions,
      .pane-header-buttons {
        width: 100%;
        align-items: stretch;
        justify-content: flex-start;
      }

      .content-header-main {
        flex-direction: column;
      }

      .content-header-toolbar {
        align-items: stretch;
      }

      .shell-footer {
        flex-direction: column;
        align-items: flex-start;
      }

      .pane-header-actions span {
        text-align: left;
      }

      .code-dialog form {
        grid-template-columns: 1fr;
      }

      .code-dialog-main {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }

      const input = document.getElementById("markdownInput");

      const workspace = document.querySelector(".workspace");

      const saveAsMarkdownButton = document.getElementById("saveAsMarkdownButton");
      const toggleEditorButton = document.getElementById("toggleEditorButton");
      const markdownFileLabel = document.getElementById("markdownFileLabel");
      const markdownFileInput = document.getElementById("markdownFileInput");
      const toastStack = document.getElementById("toastStack");
      const confirmDialog = document.getElementById("confirmDialog");
      const confirmDialogTitle = document.getElementById("confirmDialogTitle");
      const confirmDialogMessage = document.getElementById("confirmDialogMessage");
      const confirmDialogCancel = document.getElementById("confirmDialogCancel");
      const confirmDialogAccept = document.getElementById("confirmDialogAccept");
      const outline = document.getElementById("outline");
      const wordCount = document.getElementById("wordCount");
      const editorPane = document.getElementById("editorPane");
      const codeDialog = document.getElementById("codeDialog");
      const codeLanguage = document.getElementById("codeLanguage");
      const codeSnippetInput = document.getElementById("codeSnippetInput");
      const codePreview = document.getElementById("codePreview");
      const codePreviewLanguage = document.getElementById("codePreviewLanguage");
      const codeDialogCancel = document.getElementById("codeDialogCancel");
      const codeDialogAccept = document.getElementById("codeDialogAccept");

      let isSyncingScroll = false;
      let saveTimer = null;
      let dialogSelection = { start: 0, end: 0 };
      let activeHeadingId = "";
      let currentFileHandle = null;
      let currentFileName = "";
      let isDirty = false;
      let confirmResolver = null;
      let previewBlocks = [];
      let activeInlineEdit = null;
      let isEditorCollapsed = false;

      /**
       * The parser follows a safety-first design:
       * 1. Escape all raw HTML so user input cannot inject markup.
       * 2. Transform Markdown syntax into controlled HTML.
       * 3. Only allow safe URL schemes for links and images.
       */
      function renderMarkdown(markdown) {
        const normalized = markdown.replace(/\r\n?/g, "\n");
        const codeBlocks = [];
        const escaped = escapeHtml(normalized).replace(/```([\w-]*)\n([\s\S]*?)```/g, (_, lang, code) => {
          const token = createToken("CODEBLOCK", codeBlocks.length);
          const language = lang ? ` class="language-${escapeAttribute(lang)}"` : "";
          codeBlocks.push(`<pre><code${language}>${code.replace(/\n$/, "")}</code></pre>`);
          return token;
        });

        const lines = escaped.split("\n");
        const html = [];
        let paragraph = [];
        let listBuffer = null;

        const flushParagraph = () => {
          if (!paragraph.length) return;
          html.push(`<p>${parseInline(paragraph.join(" "))}</p>`);
          paragraph = [];
        };

        const flushList = () => {
          if (!listBuffer) return;
          const tag = listBuffer.type === "ol" ? "ol" : "ul";
          html.push(`<${tag}>${listBuffer.items.map((item) => `<li>${parseInline(item)}</li>`).join("")}</${tag}>`);
          listBuffer = null;
        };

        for (let i = 0; i < lines.length; i += 1) {
          const line = lines[i];
          const trimmed = line.trim();

          if (!trimmed) {
            flushParagraph();
            flushList();
            continue;
          }

          if (trimmed.startsWith("{{CODEBLOCK:")) {
            flushParagraph();
            flushList();
            html.push(trimmed);
            continue;
          }

          if (isTableHeader(lines, i)) {
            flushParagraph();
            flushList();
            const tableHtml = buildTable(lines, i);
            html.push(tableHtml.html);
            i = tableHtml.endIndex;
            continue;
          }

          const headingMatch = trimmed.match(/^(#{1,6})\s+(.*)$/);
          if (headingMatch) {
            flushParagraph();
            flushList();
            const level = headingMatch[1].length;
            html.push(`<h${level}>${parseInline(headingMatch[2])}</h${level}>`);
            continue;
          }

          const quoteMatch = line.match(/^\s*&gt;\s?(.*)$/);
          if (quoteMatch) {
            flushParagraph();
            flushList();
            const quoteLines = [quoteMatch[1]];
            while (i + 1 < lines.length) {
              const nextMatch = lines[i + 1].match(/^\s*&gt;\s?(.*)$/);
              if (!nextMatch) break;
              quoteLines.push(nextMatch[1]);
              i += 1;
            }
            html.push(`<blockquote>${quoteLines.map((item) => `<p>${parseInline(item)}</p>`).join("")}</blockquote>`);
            continue;
          }

          const orderedMatch = line.match(/^\s*\d+\.\s+(.*)$/);
          if (orderedMatch) {
            flushParagraph();
            if (!listBuffer || listBuffer.type !== "ol") {
              flushList();
              listBuffer = { type: "ol", items: [] };
            }
            listBuffer.items.push(orderedMatch[1]);
            continue;
          }

          const unorderedMatch = line.match(/^\s*[-*+]\s+(.*)$/);
          if (unorderedMatch) {
            flushParagraph();
            if (!listBuffer || listBuffer.type !== "ul") {
              flushList();
              listBuffer = { type: "ul", items: [] };
            }
            listBuffer.items.push(unorderedMatch[1]);
            continue;
          }

          flushList();
          paragraph.push(trimmed);
        }

        flushParagraph();
        flushList();

        return restoreTokens(html.join("\n"), codeBlocks);
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function escapeAttribute(value) {
        return value.replace(/"/g, "&quot;");
      }

      function createToken(type, index) {
        return `{{${type}:${index}}}`;
      }

      function restoreTokens(html, codeBlocks) {
        return html.replace(/\{\{CODEBLOCK:(\d+)}}/g, (_, index) => codeBlocks[Number(index)] || "");
      }

      function parseInline(text) {
        let output = text;

        output = output.replace(/!\[([^\]]*)]\(([^)]+)\)/g, (_, alt, url) => {
          const safeUrl = sanitizeUrl(url);
          if (!safeUrl) return alt;
          return `<img src="${safeUrl}" alt="${alt}">`;
        });

        output = output.replace(/\[([^\]]+)]\(([^)]+)\)/g, (_, label, url) => {
          const safeUrl = sanitizeUrl(url);
          if (!safeUrl) return label;
          return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${label}</a>`;
        });

        output = output.replace(/`([^`]+)`/g, "<code>$1</code>");
        output = output.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        output = output.replace(/(^|[^\*])\*([^*]+)\*(?!\*)/g, "$1<em>$2</em>");
        output = output.replace(/(^|[^_])_([^_]+)_(?!_)/g, "$1<em>$2</em>");

        return output;
      }

      function sanitizeUrl(url) {
        const raw = url.trim();
        try {
          const parsed = new URL(raw, window.location.href);
          const allowedProtocols = ["http:", "https:", "data:", "blob:"];
          const isDataImage = parsed.protocol === "data:" && raw.startsWith("data:image/");
          if (allowedProtocols.includes(parsed.protocol) && (parsed.protocol !== "data:" || isDataImage)) {
            return escapeAttribute(parsed.href);
          }
        } catch (error) {
          return "";
        }
        return "";
      }

      function isTableHeader(lines, index) {
        if (index + 1 >= lines.length) return false;
        const header = lines[index].trim();
        const separator = lines[index + 1].trim();
        return header.includes("|") && /^[:|\-\s]+$/.test(separator) && separator.includes("-");
      }

      function buildTable(lines, startIndex) {
        const tableLines = [lines[startIndex], lines[startIndex + 1]];
        let endIndex = startIndex + 1;

        while (endIndex + 1 < lines.length && lines[endIndex + 1].includes("|") && lines[endIndex + 1].trim()) {
          tableLines.push(lines[endIndex + 1]);
          endIndex += 1;
        }

        const rows = tableLines.map((line) => splitTableCells(line));
        const headerCells = rows[0];
        const bodyRows = rows.slice(2);

        const head = `<thead><tr>${headerCells.map((cell) => `<th>${parseInline(cell)}</th>`).join("")}</tr></thead>`;
        const body = `<tbody>${bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${parseInline(cell)}</td>`).join("")}</tr>`).join("")}</tbody>`;
        return { html: `<table>${head}${body}</table>`, endIndex };
      }

      function splitTableCells(line) {
        return line
          .trim()
          .replace(/^\|/, "")
          .replace(/\|$/, "")
          .split("|")
          .map((cell) => cell.trim());
      }

      function isRawTableHeader(lines, index) {
        if (index + 1 >= lines.length) return false;
        const header = lines[index].trim();
        const separator = lines[index + 1].trim();
        return header.includes("|") && /^[:|\-\s]+$/.test(separator) && separator.includes("-");
      }

      function parseTableBlock(lines, startIndex) {
        const tableLines = [lines[startIndex], lines[startIndex + 1]];
        let endIndex = startIndex + 1;

        while (endIndex + 1 < lines.length && lines[endIndex + 1].includes("|") && lines[endIndex + 1].trim()) {
          tableLines.push(lines[endIndex + 1]);
          endIndex += 1;
        }

        const rows = tableLines.map((line) => splitTableCells(line));
        return {
          block: {
            type: "table",
            rows
          },
          endIndex
        };
      }

      function parseMarkdownBlocks(markdown) {
        const normalized = markdown.replace(/\r\n?/g, "\n");
        const lines = normalized.split("\n");
        const blocks = [];

        for (let index = 0; index < lines.length; index += 1) {
          const line = lines[index];
          const trimmed = line.trim();

          if (!trimmed) {
            continue;
          }

          const codeFenceMatch = line.match(/^```([\w-]*)\s*$/);
          if (codeFenceMatch) {
            const codeLines = [];
            let endIndex = index + 1;
            while (endIndex < lines.length && !lines[endIndex].match(/^```/)) {
              codeLines.push(lines[endIndex]);
              endIndex += 1;
            }

            blocks.push({
              type: "code",
              language: normaliseLanguage(codeFenceMatch[1] || "text"),
              content: codeLines.join("\n")
            });
            index = Math.min(endIndex, lines.length - 1);
            continue;
          }

          const headingMatch = trimmed.match(/^(#{1,6})\s+(.*)$/);
          if (headingMatch) {
            blocks.push({
              type: "heading",
              level: headingMatch[1].length,
              content: headingMatch[2]
            });
            continue;
          }

          if (isRawTableHeader(lines, index)) {
            const table = parseTableBlock(lines, index);
            blocks.push(table.block);
            index = table.endIndex;
            continue;
          }

          const quoteMatch = line.match(/^\s*>\s?(.*)$/);
          if (quoteMatch) {
            const quoteLines = [quoteMatch[1]];
            while (index + 1 < lines.length) {
              const nextMatch = lines[index + 1].match(/^\s*>\s?(.*)$/);
              if (!nextMatch) break;
              quoteLines.push(nextMatch[1]);
              index += 1;
            }
            blocks.push({
              type: "blockquote",
              lines: quoteLines
            });
            continue;
          }

          const orderedMatch = line.match(/^\s*\d+\.\s+(.*)$/);
          if (orderedMatch) {
            const items = [orderedMatch[1]];
            while (index + 1 < lines.length) {
              const nextMatch = lines[index + 1].match(/^\s*\d+\.\s+(.*)$/);
              if (!nextMatch) break;
              items.push(nextMatch[1]);
              index += 1;
            }
            blocks.push({
              type: "ol",
              items
            });
            continue;
          }

          const unorderedMatch = line.match(/^\s*[-*+]\s+(.*)$/);
          if (unorderedMatch) {
            const items = [unorderedMatch[1]];
            while (index + 1 < lines.length) {
              const nextMatch = lines[index + 1].match(/^\s*[-*+]\s+(.*)$/);
              if (!nextMatch) break;
              items.push(nextMatch[1]);
              index += 1;
            }
            blocks.push({
              type: "ul",
              items
            });
            continue;
          }

          const paragraphLines = [trimmed];
          while (index + 1 < lines.length) {
            const nextLine = lines[index + 1];
            const nextTrimmed = nextLine.trim();
            if (!nextTrimmed) break;
            if (nextLine.match(/^```([\w-]*)\s*$/)) break;
            if (nextTrimmed.match(/^(#{1,6})\s+/)) break;
            if (nextLine.match(/^\s*>\s?/)) break;
            if (nextLine.match(/^\s*\d+\.\s+/)) break;
            if (nextLine.match(/^\s*[-*+]\s+/)) break;
            if (isRawTableHeader(lines, index + 1)) break;
            paragraphLines.push(nextTrimmed);
            index += 1;
          }

          blocks.push({
            type: "paragraph",
            content: paragraphLines.join(" ")
          });
        }

        return blocks;
      }

      function tableRowsToMarkdown(rows) {
        return rows.map((row) => `| ${row.join(" | ")} |`).join("\n");
      }

      function blockToMarkdown(block) {
        switch (block.type) {
          case "heading":
            return `${"#".repeat(block.level || 1)} ${block.content}`.trimEnd();
          case "blockquote":
            return (block.lines || []).map((line) => `> ${line}`.trimEnd()).join("\n");
          case "code":
            return `\`\`\`${block.language && block.language !== "text" ? block.language : ""}\n${block.content}\n\`\`\``;
          case "ul":
            return (block.items || []).map((item) => `- ${item}`).join("\n");
          case "ol":
            return (block.items || []).map((item, index) => `${index + 1}. ${item}`).join("\n");
          case "table":
            return tableRowsToMarkdown(block.rows || []);
          case "paragraph":
          default:
            return block.content || "";
        }
      }

      function blocksToMarkdown(blocks) {
        return blocks.map((block) => blockToMarkdown(block)).join("\n\n");
      }

      function renderTableFromRows(rows) {
        if (!rows.length) return "<p></p>";
        const headerCells = rows[0];
        const bodyRows = rows.slice(2);
        const head = `<thead><tr>${headerCells.map((cell) => `<th>${parseInline(cell)}</th>`).join("")}</tr></thead>`;
        const body = `<tbody>${bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${parseInline(cell)}</td>`).join("")}</tr>`).join("")}</tbody>`;
        return `<table>${head}${body}</table>`;
      }

      function renderBlockContent(block) {
        switch (block.type) {
          case "heading":
            return `<h${block.level}>${parseInline(block.content)}</h${block.level}>`;
          case "blockquote":
            return `<blockquote>${(block.lines || []).map((line) => `<p>${parseInline(line)}</p>`).join("")}</blockquote>`;
          case "code": {
            const language = block.language && block.language !== "text" ? ` class="language-${escapeAttribute(block.language)}"` : "";
            return `<pre><code${language}>${escapeHtml(block.content)}</code></pre>`;
          }
          case "ul":
            return `<ul>${(block.items || []).map((item) => `<li>${parseInline(item)}</li>`).join("")}</ul>`;
          case "ol":
            return `<ol>${(block.items || []).map((item) => `<li>${parseInline(item)}</li>`).join("")}</ol>`;
          case "table":
            return renderTableFromRows(block.rows || []);
          case "paragraph":
          default:
            return `<p>${parseInline(block.content || "")}</p>`;
        }
      }

      function getInlineEditState(block, index, options = {}) {
        if (block.type === "heading") {
          const cappedLevel = Math.min(block.level || 1, 3);
          return { index, type: `heading-${cappedLevel}`, content: block.content, language: "text", isNewBlock: Boolean(options.isNewBlock) };
        }

        if (block.type === "blockquote") {
          return { index, type: "blockquote", content: (block.lines || []).join("\n"), language: "text", isNewBlock: Boolean(options.isNewBlock) };
        }

        if (block.type === "code") {
          return { index, type: "code", content: block.content, language: block.language || "text", isNewBlock: Boolean(options.isNewBlock) };
        }

        if (block.type === "ul" || block.type === "ol") {
          return { index, type: block.type, content: (block.items || []).join("\n"), language: "text", isNewBlock: Boolean(options.isNewBlock) };
        }

        if (block.type === "table") {
          return { index, type: "table", content: tableRowsToMarkdown(block.rows || []), language: "text", isNewBlock: Boolean(options.isNewBlock) };
        }

        return { index, type: "paragraph", content: block.content || "", language: "text", isNewBlock: Boolean(options.isNewBlock) };
      }

      function renderInlineEditor(index) {
        const editor = activeInlineEdit;
        const showLanguage = editor.type === "code";
        const typeOptions = [
          ["paragraph", "Paragraph"],
          ["heading-1", "Heading 1"],
          ["heading-2", "Heading 2"],
          ["heading-3", "Heading 3"],
          ["blockquote", "Blockquote"],
          ["ul", "Bullet List"],
          ["ol", "Numbered List"],
          ["code", "Code Block"],
          ["table", "Table"]
        ];

        return `
          <div class="inline-editor" data-inline-editor="true" data-block-id="${index}">
            <div class="inline-editor-toolbar">
              <div class="inline-editor-controls">
                <label>
                  Block type
                  <select class="inline-editor-type" data-editor-field="type">
                    ${typeOptions.map(([value, label]) => `<option value="${value}"${editor.type === value ? " selected" : ""}>${label}</option>`).join("")}
                  </select>
                </label>
                ${showLanguage ? `
                  <label>
                    Code language
                    <select class="inline-editor-language" data-editor-field="language">
                      <option value="text"${editor.language === "text" ? " selected" : ""}>Plain text</option>
                      <option value="javascript"${editor.language === "javascript" ? " selected" : ""}>JavaScript</option>
                      <option value="python"${editor.language === "python" ? " selected" : ""}>Python</option>
                      <option value="csharp"${editor.language === "csharp" ? " selected" : ""}>C#</option>
                    </select>
                  </label>
                ` : ""}
              </div>
              <div class="inline-editor-actions">
                <button type="button" class="header-button" data-editor-action="cancel">CANCEL</button>
                <button type="button" class="header-button" data-primary="true" data-editor-action="confirm">CONFIRM</button>
              </div>
            </div>
            <div class="inline-editor-body">
              <textarea class="inline-editor-textarea" data-editor-field="content" spellcheck="false">${escapeHtml(editor.content || "")}</textarea>
            </div>
          </div>
        `;
      }

      function renderBlockActions(index, type) {
        return `
          <div class="preview-block-actions" aria-label="Block actions">
            <button type="button" class="preview-block-action" data-block-action="delete" data-block-id="${index}" aria-label="Delete ${type} block" title="Delete block">-</button>
            <button type="button" class="preview-block-action" data-block-action="insert-before" data-block-id="${index}" aria-label="Insert block before ${type}" title="Insert block before">^+</button>
            <button type="button" class="preview-block-action" data-block-action="insert-after" data-block-id="${index}" aria-label="Insert block after ${type}" title="Insert block after">v+</button>
          </div>
        `;
      }

      function renderPreviewBlocks() {
        preview.innerHTML = previewBlocks
          .map((block, index) => {
            if (activeInlineEdit && activeInlineEdit.index === index) {
              return `<section class="preview-block is-editing" data-block-id="${index}" data-block-type="${block.type}">${renderInlineEditor(index)}</section>`;
            }

              return `
                <section class="preview-block" data-block-id="${index}" data-block-type="${block.type}" tabindex="0" aria-label="Editable ${block.type} block">
                  ${renderBlockActions(index, block.type)}
                  ${renderBlockContent(block)}
                </section>
              `;
            })
          .join("");
        syncOutline();
        syncWorkspaceHeight();
        updateActiveHeadingFromPreview();
      }

      function applyInlineEdit() {
        const editor = activeInlineEdit;
        if (!editor) return null;

        const content = (editor.content || "").replace(/\r\n?/g, "\n").trimEnd();
        switch (editor.type) {
          case "heading-1":
          case "heading-2":
          case "heading-3":
            return {
              type: "heading",
              level: Number(editor.type.split("-")[1]),
              content: content || "Untitled heading"
            };
          case "blockquote":
            return {
              type: "blockquote",
              lines: (content || "Quote").split("\n")
            };
          case "ul": {
            const items = content.split("\n").map((item) => item.trim()).filter(Boolean);
            if (!items.length) return null;
            return { type: "ul", items };
          }
          case "ol": {
            const items = content.split("\n").map((item) => item.trim()).filter(Boolean);
            if (!items.length) return null;
            return { type: "ol", items };
          }
          case "code":
            return {
              type: "code",
              language: normaliseLanguage(editor.language || "text"),
              content
            };
          case "table": {
            const tableLines = content.split("\n").map((line) => line.trim()).filter(Boolean);
            if (tableLines.length < 2 || !tableLines[0].includes("|") || !/^[:|\-\s]+$/.test(tableLines[1])) {
              return null;
            }
            return {
              type: "table",
              rows: tableLines.map((line) => splitTableCells(line))
            };
          }
          case "paragraph":
          default:
            return {
              type: "paragraph",
              content: content || "New paragraph"
            };
        }
      }

      function createEmptyBlock() {
        return {
          type: "paragraph",
          content: "New paragraph"
        };
      }

      function commitBlockMutation(messageTitle, messageBody) {
        input.value = blocksToMarkdown(previewBlocks);
        handleInput(false);
        if (messageTitle) {
          showToast(messageTitle, messageBody);
        }
      }

      function openInlineEditor(index, options = {}) {
        activeInlineEdit = getInlineEditState(previewBlocks[index], index, options);
        renderPreviewBlocks();
        window.requestAnimationFrame(() => {
          const field = preview.querySelector(".inline-editor-textarea");
          if (field) field.focus();
        });
      }

      function slugifyHeading(text) {
        return text
          .toLowerCase()
          .replace(/[^a-z0-9\s-]/g, "")
          .trim()
          .replace(/\s+/g, "-") || "section";
      }

      function syncOutline() {
        const headings = [...preview.querySelectorAll("h1, h2, h3, h4, h5, h6")];
        const slugCounts = new Map();

        headings.forEach((heading) => {
          const baseSlug = slugifyHeading(heading.textContent || "");
          const currentCount = slugCounts.get(baseSlug) || 0;
          slugCounts.set(baseSlug, currentCount + 1);
          heading.id = currentCount === 0 ? baseSlug : `${baseSlug}-${currentCount + 1}`;
        });

        if (!headings.length) {
          outline.innerHTML = `<p class="outline-empty">Add Markdown headings to build a clickable document outline.</p>`;
          activeHeadingId = "";
          return;
        }

        outline.innerHTML = headings
          .map((heading) => {
            const level = heading.tagName.slice(1);
            const isActive = heading.id === activeHeadingId;
            return `<button type="button" class="outline-item${isActive ? " is-active" : ""}" data-target="${heading.id}" data-level="${level}">${escapeHtml(heading.textContent || "Untitled section")}</button>`;
          })
          .join("");

        if (!activeHeadingId) {
          setActiveOutlineHeading(headings[0].id);
        }
      }

      function setActiveOutlineHeading(headingId) {
        activeHeadingId = headingId;
        outline.querySelectorAll(".outline-item").forEach((item) => {
          item.classList.toggle("is-active", item.dataset.target === headingId);
        });
      }

      function updateActiveHeadingFromPreview() {
        const headings = [...preview.querySelectorAll("h1, h2, h3, h4, h5, h6")];
        if (!headings.length) return;

        const previewTop = preview.getBoundingClientRect().top;
        let currentHeading = headings[0];

        headings.forEach((heading) => {
          if (heading.getBoundingClientRect().top - previewTop <= 32) {
            currentHeading = heading;
          }
        });

        setActiveOutlineHeading(currentHeading.id);
      }

      function updatePreview() {
        previewBlocks = parseMarkdownBlocks(input.value);
        activeInlineEdit = null;
        renderPreviewBlocks();
        updateWordCount(input.value);
      }

      function updateWordCount(text) {
        const count = text.trim() ? text.trim().split(/\s+/).length : 0;
        wordCount.textContent = `${count} word${count === 1 ? "" : "s"}`;
      }

      function showToast(title, message = "", options = {}) {
        const { duration = 2600, id = "" } = options;
        let toast = id ? toastStack.querySelector(`[data-toast-id="${id}"]`) : null;

        if (!toast) {
          toast = document.createElement("div");
          toast.className = "toast";
          if (id) {
            toast.dataset.toastId = id;
          }
          toastStack.appendChild(toast);
        }

        window.clearTimeout(toast._hideTimer);
        toast.innerHTML = `<strong class="toast-title">${escapeHtml(title)}</strong>${message ? `<span>${escapeHtml(message)}</span>` : ""}`;
        toast.classList.remove("is-visible");
        window.requestAnimationFrame(() => toast.classList.add("is-visible"));

        if (duration > 0) {
          toast._hideTimer = window.setTimeout(() => {
            toast.classList.remove("is-visible");
            window.setTimeout(() => {
              if (toast.parentElement) {
                toast.remove();
              }
            }, 220);
          }, duration);
        }
      }

      function markDirty(nextDirty) {
        isDirty = nextDirty;
        saveMarkdownButton.dataset.accent = nextDirty ? "true" : "false";
        updateFileLabel();
      }

      function updateFileLabel() {
        const label = currentFileName || "Untitled draft";
        markdownFileLabel.textContent = isDirty ? `${label} *` : label;
      }

      function setEditorCollapsed(collapsed) {
        isEditorCollapsed = collapsed;
        workspace.classList.toggle("editor-collapsed", collapsed);
        toggleEditorButton.setAttribute("aria-checked", collapsed ? "false" : "true");
        toggleEditorButton.setAttribute("title", collapsed ? "EDITOR HIDDEN" : "EDITOR VISIBLE");
        syncWorkspaceHeight();
        if (collapsed) {
          preview.focus({ preventScroll: true });
        } else {
          input.focus({ preventScroll: true });
        }
      }

      function toggleEditorCollapsed() {
        setEditorCollapsed(!isEditorCollapsed);
      }

      function syncWorkspaceHeight() {
        const availableHeight = contentArea.clientHeight - contentHeader.offsetHeight - contentFooter.offsetHeight;
        const height = Math.max(availableHeight, 320);
        workspace.style.minHeight = `${height}px`;
        workspace.style.height = `${height}px`;
      }

      function persistDraft(showStatusToast = true) {
        localStorage.setItem(STORAGE_KEY, input.value);
        if (showStatusToast) {
          showToast("SAVED LOCALLY", "", { id: "save-status", duration: 1600 });
        }
      }

      function scheduleSave(showStatusToast = true) {
        if (showStatusToast) {
          showToast("SAVING...", "", { id: "save-status", duration: 0 });
        }
        window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(() => persistDraft(showStatusToast), 220);
      }

      function setDocumentContent(content, options = {}) {
        input.value = content;
        if (options.fileName !== undefined) {
          currentFileName = options.fileName;
        }
        if (options.fileHandle !== undefined) {
          currentFileHandle = options.fileHandle;
        }
        updatePreview();
        updateWordCount(input.value);
        persistDraft(Boolean(options.showStatusToast));
        markDirty(Boolean(options.dirty));
      }

      function openConfirmDialog(title, message, acceptLabel = "Continue") {
        confirmDialogTitle.textContent = title;
        confirmDialogMessage.textContent = message;
        confirmDialogAccept.textContent = acceptLabel.toUpperCase();

        return new Promise((resolve) => {
          confirmResolver = resolve;
          if (typeof confirmDialog.showModal === "function") {
            confirmDialog.showModal();
          } else {
            confirmDialog.setAttribute("open", "open");
          }
        });
      }

      function closeConfirmDialog(result) {
        if (confirmResolver) {
          confirmResolver(result);
          confirmResolver = null;
        }
        if (typeof confirmDialog.close === "function") {
          confirmDialog.close();
        } else {
          confirmDialog.removeAttribute("open");
        }
      }

      async function confirmIfDirty(title, message, acceptLabel) {
        if (!isDirty) return true;
        return openConfirmDialog(title, message, acceptLabel);
      }

      function setTheme(theme) {
        document.body.classList.toggle("dark", theme === "dark");
        localStorage.setItem(THEME_KEY, theme);
      }

      /**
       * Toolbar actions reuse a small set of text helpers so both clicks and
       * keyboard shortcuts stay consistent.
       */
      function wrapSelection(before, after = before, placeholder = "text") {
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const selected = input.value.slice(start, end) || placeholder;
        const nextValue = `${input.value.slice(0, start)}${before}${selected}${after}${input.value.slice(end)}`;

        input.value = nextValue;
        input.focus();
        input.setSelectionRange(start + before.length, start + before.length + selected.length);
        handleInput(false);
      }

      function prefixLines(prefix) {
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const selected = input.value.slice(start, end) || "Item";
        const updated = selected
          .split("\n")
          .map((line) => `${prefix}${line}`)
          .join("\n");
        input.setRangeText(updated, start, end, "select");
        input.focus();
        handleInput(false);
      }

      function insertBlock(prefix, suffix, placeholder) {
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const selected = input.value.slice(start, end) || placeholder;
        const block = `${prefix}\n${selected}\n${suffix}`;
        input.setRangeText(block, start, end, "select");
        input.focus();
        handleInput(false);
      }

      function getSelectedText() {
        return input.value.slice(input.selectionStart, input.selectionEnd);
      }

      function normaliseLanguage(language) {
        const value = (language || "").toLowerCase();
        if (!value || value === "text" || value === "plain" || value === "plaintext") return "text";
        if (value === "js" || value === "javascript") return "javascript";
        if (value === "py" || value === "python") return "python";
        if (value === "c#" || value === "cs" || value === "csharp") return "csharp";
        return "text";
      }

      function parseSelectedCodeSnippet() {
        const selectedText = getSelectedText().trim();
        const fencedMatch = selectedText.match(/^```([\w-]+)?\n([\s\S]*?)\n```$/);

        if (fencedMatch) {
          return {
            language: normaliseLanguage(fencedMatch[1] || "javascript"),
            code: fencedMatch[2]
          };
        }

        return {
          language: "javascript",
          code: getSelectedText() || "const example = true;"
        };
      }

      function openCodeDialog() {
        const snippet = parseSelectedCodeSnippet();
        dialogSelection = {
          start: input.selectionStart,
          end: input.selectionEnd
        };
        codeLanguage.value = snippet.language;
        codeSnippetInput.value = snippet.code;
        updateCodePreview();
        if (typeof codeDialog.showModal === "function") {
          codeDialog.showModal();
        } else {
          codeDialog.setAttribute("open", "open");
        }
        window.setTimeout(() => codeSnippetInput.focus(), 0);
      }

      function closeCodeDialog() {
        if (typeof codeDialog.close === "function") {
          codeDialog.close();
        } else {
          codeDialog.removeAttribute("open");
        }
      }

      /**
       * The syntax highlighter is intentionally lightweight: it recognizes the
       * token classes we need for a pleasant preview and image export while
       * staying completely self-contained.
       */
      function tokenizeLine(language, line) {
        const keywordSet = new Set(LANGUAGE_META[language].keywords);
        const tokens = [];
        let index = 0;

        while (index < line.length) {
          const rest = line.slice(index);
          const commentPattern = language === "python" ? /^#.*/ : /^\/\/.*/;
          const commentMatch = rest.match(commentPattern);
          if (commentMatch) {
            tokens.push({ type: "comment", value: commentMatch[0] });
            break;
          }

          const stringMatch = rest.match(/^("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`)/);
          if (stringMatch) {
            tokens.push({ type: "string", value: stringMatch[0] });
            index += stringMatch[0].length;
            continue;
          }

          const numberMatch = rest.match(/^\b\d+(?:\.\d+)?\b/);
          if (numberMatch) {
            tokens.push({ type: "number", value: numberMatch[0] });
            index += numberMatch[0].length;
            continue;
          }

          const keywordMatch = rest.match(/^[A-Za-z_][A-Za-z0-9_]*/);
          if (keywordMatch) {
            const value = keywordMatch[0];
            tokens.push({ type: keywordSet.has(value) ? "keyword" : "plain", value });
            index += value.length;
            continue;
          }

          const operatorMatch = rest.match(/^(=>|==={0,1}|!==|!=|<=|>=|&&|\|\||[-+*/%=<>()[\]{}.,:;])/);
          if (operatorMatch) {
            tokens.push({ type: "operator", value: operatorMatch[0] });
            index += operatorMatch[0].length;
            continue;
          }

          tokens.push({ type: "plain", value: rest[0] });
          index += 1;
        }

        return tokens;
      }

      function tokenizeCode(language, code) {
        return code.split("\n").map((line) => tokenizeLine(language, line));
      }

      function highlightCodeHtml(language, code) {
        return tokenizeCode(language, code)
          .map((lineTokens) => lineTokens.map((token) => `<span class="token-${token.type}">${escapeHtml(token.value)}</span>`).join(""))
          .join("\n");
      }

      function updateCodePreview() {
        const language = codeLanguage.value;
        codePreviewLanguage.textContent = LANGUAGE_META[language].label;
        codePreview.innerHTML = highlightCodeHtml(language, codeSnippetInput.value || "");
      }

      function getTokenColor(type) {
        if (type === "keyword") return "#ff8f70";
        if (type === "string") return "#c3e88d";
        if (type === "number") return "#82aaff";
        if (type === "comment") return "#7f8da3";
        if (type === "operator") return "#89ddff";
        return "#dbe7f3";
      }

      function roundRect(context, x, y, width, height, radius, topOnly = false) {
        const bottomRadius = topOnly ? 0 : radius;
        context.beginPath();
        context.moveTo(x + radius, y);
        context.lineTo(x + width - radius, y);
        context.quadraticCurveTo(x + width, y, x + width, y + radius);
        context.lineTo(x + width, y + height - bottomRadius);
        context.quadraticCurveTo(x + width, y + height, x + width - bottomRadius, y + height);
        context.lineTo(x + bottomRadius, y + height);
        context.quadraticCurveTo(x, y + height, x, y + height - bottomRadius);
        context.lineTo(x, y + radius);
        context.quadraticCurveTo(x, y, x + radius, y);
        context.closePath();
      }

      function renderCodeImage(language, code) {
        const tokensByLine = tokenizeCode(language, code || "");
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        const scale = window.devicePixelRatio || 1;
        const padding = 28;
        const headerHeight = 46;
        const lineHeight = 26;
        const fontSize = 18;
        const fontFamily = "Cascadia Code, Consolas, monospace";

        context.font = `${fontSize}px ${fontFamily}`;

        const lineStrings = tokensByLine.map((lineTokens) => lineTokens.map((token) => token.value).join(""));
        const widestLine = Math.max(...lineStrings.map((line) => context.measureText(line || " ").width), context.measureText(LANGUAGE_META[language].label).width + 48);
        const width = Math.ceil(widestLine + padding * 2);
        const height = Math.max(160, Math.ceil(headerHeight + padding + tokensByLine.length * lineHeight + padding));

        canvas.width = width * scale;
        canvas.height = height * scale;
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        context.scale(scale, scale);

        context.fillStyle = "#0f172a";
        roundRect(context, 0, 0, width, height, 22);
        context.fill();

        context.fillStyle = "#162033";
        roundRect(context, 0, 0, width, headerHeight, 22, true);
        context.fill();

        context.fillStyle = "#ff8f70";
        context.beginPath();
        context.arc(24, 23, 5, 0, Math.PI * 2);
        context.arc(40, 23, 5, 0, Math.PI * 2);
        context.arc(56, 23, 5, 0, Math.PI * 2);
        context.fill();

        context.fillStyle = "#dbe7f3";
        context.font = `600 14px "Segoe UI", sans-serif`;
        context.fillText(LANGUAGE_META[language].label, width - padding - context.measureText(LANGUAGE_META[language].label).width, 28);

        context.font = `${fontSize}px ${fontFamily}`;
        let y = headerHeight + padding;

        tokensByLine.forEach((lineTokens) => {
          let x = padding;
          lineTokens.forEach((token) => {
            context.fillStyle = getTokenColor(token.type);
            context.fillText(token.value, x, y);
            x += context.measureText(token.value).width;
          });
          y += lineHeight;
        });

        return canvas.toDataURL("image/png");
      }

      function createCodeImageMarkdown(language, code) {
        const dataUrl = renderCodeImage(language, code.replace(/\r\n?/g, "\n"));
        const altText = `Code snippet (${LANGUAGE_META[language].label})`;
        return `![${altText}](${dataUrl})`;
      }

      function acceptCodeDialog() {
        const imageMarkdown = createCodeImageMarkdown(codeLanguage.value, codeSnippetInput.value);
        input.focus();
        input.setSelectionRange(dialogSelection.start, dialogSelection.end);
        input.setRangeText(`\n${imageMarkdown}\n`, dialogSelection.start, dialogSelection.end, "end");
        handleInput(false);
        closeCodeDialog();
      }

      function downloadFile(filename, content, mimeType) {
        const blob = new Blob([content], { type: mimeType });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      }

      function getSuggestedMarkdownFilename() {
        return currentFileName || "document.md";
      }

      async function loadMarkdownFromFile(file, fileHandle = null) {
        const content = await file.text();
        setDocumentContent(content, {
          fileName: file.name || currentFileName,
          fileHandle,
          dirty: false,
          showStatusToast: false
        });
        showToast("Loaded", `${file.name || "Document"} is now open.`);
      }

      async function handleLoadMarkdown() {
        try {
          const canContinue = await confirmIfDirty(
            "Load another file?",
            "You have unsaved changes in the current document. Loading a file will replace the editor contents.",
            "Load file"
          );
          if (!canContinue) return;

          if (window.showOpenFilePicker) {
            const [fileHandle] = await window.showOpenFilePicker({
              multiple: false,
              types: [
                {
                  description: "Markdown files",
                  accept: {
                    "text/markdown": [".md", ".markdown"],
                    "text/plain": [".txt"]
                  }
                }
              ]
            });
            if (!fileHandle) return;
            const file = await fileHandle.getFile();
            await loadMarkdownFromFile(file, fileHandle);
            return;
          }

          markdownFileInput.click();
        } catch (error) {
          if (error && error.name === "AbortError") return;
          console.error("Unable to load markdown file", error);
          showToast("Load failed", "The selected file could not be opened.");
        }
      }

      async function handleSaveMarkdown(saveAs = false) {
        const content = input.value;

        try {
          if (window.showSaveFilePicker) {
            const fileHandle = !saveAs && currentFileHandle ? currentFileHandle : await window.showSaveFilePicker({
              suggestedName: getSuggestedMarkdownFilename(),
              types: [
                {
                  description: "Markdown files",
                  accept: {
                    "text/markdown": [".md", ".markdown"],
                    "text/plain": [".txt"]
                  }
                }
              ]
            });
            if (!fileHandle) return;

            const writable = await fileHandle.createWritable();
            await writable.write(content);
            await writable.close();

            currentFileHandle = fileHandle;
            currentFileName = fileHandle.name || currentFileName;
            updateFileLabel();
            markDirty(false);
            showToast("SAVED TO FILE", "", { id: "save-status", duration: 1600 });
            showToast(saveAs ? "Saved as" : "Saved", `${currentFileName || "Document"} was written to disk.`);
            return;
          }

          const fileName = saveAs || !currentFileName ? getSuggestedMarkdownFilename() : currentFileName;
          downloadFile(fileName, content, "text/markdown;charset=utf-8");
          currentFileName = fileName;
          markDirty(false);
          updateFileLabel();
          showToast("DOWNLOADED MARKDOWN", "", { id: "save-status", duration: 1600 });
          showToast("Downloaded", `${fileName} was downloaded from the browser.`);
        } catch (error) {
          if (error && error.name === "AbortError") return;
          console.error("Unable to save markdown file", error);
          showToast("Save failed", "The document could not be saved.");
        }
      }

      async function handleNewMarkdown() {
        const canContinue = await confirmIfDirty(
          "Create a new document?",
          "You have unsaved changes in the current document. Creating a new document will replace the current contents.",
          "Create new"
        );
        if (!canContinue) return;

        currentFileHandle = null;
        currentFileName = "";
        setDocumentContent(DEFAULT_CONTENT, {
          fileName: "",
          fileHandle: null,
          dirty: false,
          showStatusToast: false
        });
        showToast("New document", "Started a fresh Markdown document.");
      }

      function exportHtmlDocument() {
        const exportedHtml = previewBlocks.map((block) => renderBlockContent(block)).join("\n");
        const documentHtml = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exported Markdown</title>
</head>
<body>
${exportedHtml}
</body>
</html>`;
        downloadFile("document.html", documentHtml, "text/html;charset=utf-8");
      }

      async function handleDroppedFiles(files) {
        const images = [...files].filter((file) => file.type.startsWith("image/"));
        if (!images.length) return;

        const markdownSnippets = await Promise.all(images.map(fileToMarkdownImage));
        const insertion = `\n${markdownSnippets.join("\n")}\n`;
        const cursor = input.selectionStart;
        input.setRangeText(insertion, cursor, cursor, "end");
        handleInput(false);
      }

      function fileToMarkdownImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(`![${file.name}](${reader.result})`);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function syncScroll(source, target) {
        if (isSyncingScroll) return;
        const ratio = source.scrollTop / Math.max(source.scrollHeight - source.clientHeight, 1);
        isSyncingScroll = true;
        target.scrollTop = ratio * Math.max(target.scrollHeight - target.clientHeight, 0);
        window.requestAnimationFrame(() => {
          isSyncingScroll = false;
        });
      }

      function handleToolbarAction(action) {
        switch (action) {
          case "bold":
            wrapSelection("**");
            break;
          case "italic":
            wrapSelection("*");
            break;
          case "heading":
            prefixLines("# ");
            break;
          case "list":
            prefixLines("- ");
            break;
          case "codeBlock":
            openCodeDialog();
            break;
          case "theme":
            setTheme(document.body.classList.contains("dark") ? "light" : "dark");
            break;
          case "exportMd":
            downloadFile("document.md", input.value, "text/markdown;charset=utf-8");
            break;
          case "exportHtml":
            exportHtmlDocument();
            break;
          case "reset":
            openConfirmDialog(
              "Reset this document?",
              "Reset will restore the default starter content and remove your current unsaved edits.",
              "Reset"
            ).then((confirmed) => {
              if (!confirmed) return;
              currentFileHandle = null;
              currentFileName = "";
              setDocumentContent(DEFAULT_CONTENT, {
                fileName: "",
                fileHandle: null,
                dirty: false,
                showStatusToast: false
              });
              showToast("Reset complete", "The starter document has been restored.");
            });
            break;
          default:
            break;
        }
      }

      function handleInput(showStatusToast = true) {
        updatePreview();
        markDirty(true);
        scheduleSave(showStatusToast);
      }

      function handlePreviewEditorInput(event) {
        if (!activeInlineEdit) return;
        const field = event.target.dataset.editorField;
        if (!field) return;
        activeInlineEdit[field] = event.target.value;
      }

      function handlePreviewEditorChange(event) {
        if (!activeInlineEdit) return;
        const field = event.target.dataset.editorField;
        if (!field) return;
        activeInlineEdit[field] = event.target.value;
        if (field === "type") {
          if (event.target.value !== "code") {
            activeInlineEdit.language = "text";
          }
          renderPreviewBlocks();
        }
      }

      async function handlePreviewClick(event) {
        const blockAction = event.target.closest("[data-block-action]");
        if (blockAction) {
          const index = Number(blockAction.dataset.blockId);
          if (Number.isNaN(index)) return;

          if (blockAction.dataset.blockAction === "delete") {
            const confirmed = await openConfirmDialog(
              "Delete this block?",
              "This will remove the selected block from the document.",
              "Delete"
            );
            if (!confirmed) return;
            previewBlocks.splice(index, 1);
            activeInlineEdit = null;
            if (!previewBlocks.length) {
              previewBlocks.push(createEmptyBlock());
            }
            commitBlockMutation("Block removed", "The selected block was deleted.");
            return;
          }

          const insertIndex = blockAction.dataset.blockAction === "insert-before" ? index : index + 1;
          previewBlocks.splice(insertIndex, 0, createEmptyBlock());
          openInlineEditor(insertIndex, { isNewBlock: true });
          return;
        }

        const editorAction = event.target.closest("[data-editor-action]");
        if (editorAction) {
          if (editorAction.dataset.editorAction === "cancel") {
            if (activeInlineEdit?.isNewBlock) {
              previewBlocks.splice(activeInlineEdit.index, 1);
            }
            activeInlineEdit = null;
            renderPreviewBlocks();
            return;
          }

          if (editorAction.dataset.editorAction === "confirm") {
            const nextBlock = applyInlineEdit();
            if (!nextBlock) {
              showToast("Check the block", "That block type needs valid content before it can be applied.");
              return;
            }
            previewBlocks.splice(activeInlineEdit.index, 1, nextBlock);
            activeInlineEdit = null;
            commitBlockMutation("Block updated", "The rendered block was written back to Markdown.");
            return;
          }
        }

        if (event.target.closest("[data-inline-editor]")) return;

        const block = event.target.closest(".preview-block");
        if (!block) return;
        openInlineEditor(Number(block.dataset.blockId));
      }

      function handleShortcuts(event) {
        const shortcutKey = event.ctrlKey || event.metaKey;
        if (!shortcutKey) return;

        const key = event.key.toLowerCase();
        if (key === "b") {
          event.preventDefault();
          wrapSelection("**");
        } else if (key === "i") {
          event.preventDefault();
          wrapSelection("*");
        } else if (event.altKey && key === "1") {
          event.preventDefault();
          prefixLines("# ");
        } else if (event.shiftKey && key === "7") {
          event.preventDefault();
          prefixLines("- ");
        } else if (event.altKey && key === "c") {
          event.preventDefault();
          openCodeDialog();
        } else if (key === "s" && event.shiftKey) {
          event.preventDefault();
          handleSaveMarkdown(true);
        } else if (key === "s") {
          event.preventDefault();
          handleSaveMarkdown(false);
        } else if (key === "o") {
          event.preventDefault();
          handleLoadMarkdown();
        } else if (key === "n") {
          event.preventDefault();
          handleNewMarkdown();
        }
      }

      function initialise() {
        const savedContent = localStorage.getItem(STORAGE_KEY);
        const savedTheme = localStorage.getItem(THEME_KEY) || "dark";

        input.value = savedContent || DEFAULT_CONTENT;
        setTheme(savedTheme);
        updatePreview();
        persistDraft(false);
        markDirty(false);

        input.addEventListener("input", handleInput);
        input.addEventListener("keydown", handleShortcuts);
        input.addEventListener("scroll", () => syncScroll(input, preview));
        preview.addEventListener("click", handlePreviewClick);
        preview.addEventListener("input", handlePreviewEditorInput);
        preview.addEventListener("change", handlePreviewEditorChange);
        preview.addEventListener("scroll", () => {
          syncScroll(preview, input);
          updateActiveHeadingFromPreview();
        });

        document.querySelectorAll('[data-toolbar-actions="true"]').forEach((toolbar) => {
          toolbar.addEventListener("mousedown", (event) => {
            if (event.target.closest("button[data-action]")) {
              event.preventDefault();
            }
          });

          toolbar.addEventListener("click", (event) => {
            const button = event.target.closest("button[data-action]");
            if (!button) return;
            handleToolbarAction(button.dataset.action);
          });
        });

        outline.addEventListener("click", (event) => {
          const trigger = event.target.closest(".outline-item");
          if (!trigger) return;
          const target = preview.querySelector(`#${CSS.escape(trigger.dataset.target)}`);
          if (!target) return;
          target.scrollIntoView({ behavior: "smooth", block: "start" });
          setActiveOutlineHeading(trigger.dataset.target);
        });

        newMarkdownButton.addEventListener("click", handleNewMarkdown);
        loadMarkdownButton.addEventListener("click", handleLoadMarkdown);
        saveMarkdownButton.addEventListener("click", () => handleSaveMarkdown(false));
        saveAsMarkdownButton.addEventListener("click", () => handleSaveMarkdown(true));
        toggleEditorButton.addEventListener("click", toggleEditorCollapsed);
        markdownFileInput.addEventListener("change", async (event) => {
          const [file] = event.target.files || [];
          if (!file) return;
          currentFileHandle = null;
          await loadMarkdownFromFile(file);
          markdownFileInput.value = "";
        });

        codeLanguage.addEventListener("change", updateCodePreview);
        codeSnippetInput.addEventListener("input", updateCodePreview);
        codeDialogCancel.addEventListener("click", closeCodeDialog);
        codeDialogAccept.addEventListener("click", acceptCodeDialog);
        codeDialog.addEventListener("cancel", (event) => {
          event.preventDefault();
          closeCodeDialog();
        });
        confirmDialogCancel.addEventListener("click", () => closeConfirmDialog(false));
        confirmDialogAccept.addEventListener("click", () => closeConfirmDialog(true));
        confirmDialog.addEventListener("cancel", (event) => {
          event.preventDefault();
          closeConfirmDialog(false);
        });

        ["dragenter", "dragover"].forEach((eventName) => {
          editorPane.addEventListener(eventName, (event) => {
            event.preventDefault();
            editorPane.classList.add("drop-active");
          });
        });

        ["dragleave", "drop"].forEach((eventName) => {
          editorPane.addEventListener(eventName, (event) => {
            event.preventDefault();
            if (eventName === "drop") {
              handleDroppedFiles(event.dataTransfer.files);
            }
            editorPane.classList.remove("drop-active");
          });
        });

        updateActiveHeadingFromPreview();
        setEditorCollapsed(false);
        window.addEventListener("resize", syncWorkspaceHeight);
        window.addEventListener("beforeunload", (event) => {
          if (!isDirty) return;
          event.preventDefault();
          event.returnValue = "";
        });
      }

      initialise();
    })();
  </script>

  <style>
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</body>
</html>
